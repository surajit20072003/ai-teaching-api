version: "3.9"

services:

  # ── FastAPI Backend ─────────────────────────────────────
  api:
    build: .
    container_name: ai-teaching-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./migrations:/app/migrations
      - .:/app
    restart: unless-stopped
    command: bash -c "python migrate.py && uvicorn main:app --host 0.0.0.0 --port 8000 --workers 16 --timeout-keep-alive 300 --backlog 2048"

  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-teaching-postgres
    environment:
      POSTGRES_USER: teaching_user
      POSTGRES_PASSWORD: teaching_pass
      POSTGRES_DB: teaching_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teaching_user -d teaching_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai-teaching-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 4gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
