version: "3.9"

services:

  # ── FastAPI Backend ─────────────────────────────────────
  api:
    build: .
    container_name: ai-teaching-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./migrations:/app/migrations
      - .:/app
      - /sdb-disk/ai-teaching:/sdb-disk/ai-teaching   # 6.9TB local storage
    environment:
      - VOXCPM_URL=http://host.docker.internal:7861    # local TTS for pre-gen
      - VOXCPM_API_KEY=spassword                       # VoxCPM auth key
      - WAN2GP_URL=http://host.docker.internal:9090    # local image + video for pre-gen
      - WAN2GP_API_KEY=mypassword1234                  # Wan2GP auth key
      - OLLAMA_URL=http://host.docker.internal:11434   # local Ollama for pre-gen slide generation
      - OLLAMA_MODEL=llama3.2:3b                       # change to any loaded model e.g. mistral:7b
      - OLLAMA_TIMEOUT=600                             # 10 min — local models are slower than cloud

    extra_hosts:
      - "host.docker.internal:host-gateway"            # allow container to reach host ports
    restart: unless-stopped
    command: bash -c "python migrate.py && uvicorn main:app --host 0.0.0.0 --port 8000 --workers 16 --timeout-keep-alive 300 --backlog 2048"

  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-teaching-postgres
    environment:
      POSTGRES_USER: teaching_user
      POSTGRES_PASSWORD: teaching_pass
      POSTGRES_DB: teaching_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teaching_user -d teaching_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai-teaching-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 4gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── Adminer Database GUI ────────────────────────────────
  adminer:
    image: adminer
    container_name: ai-teaching-adminer
    restart: unless-stopped
    ports:
      - "8085:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
